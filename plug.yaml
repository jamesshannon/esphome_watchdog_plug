output:
  - id: white_output
    platform: gpio
    pin: GPIO7
    inverted: true






script:
  - id: make_http_request
    then:
      - http_request.get:
          url: https://www.google.com/generate_204
          on_response:
            then:
              - lambda: |-
                  id(last_http_status) = response->status_code;
                  id(last_http_duration_ms) = response->duration_ms;
              - script.execute: http_request_success
          on_error:
            then:
              - lambda: |-
                  id(last_http_status) = -1;
                  id(last_http_duration_ms) = 0;
              - script.execute: http_request_failure

  - id: http_request_success
    then:
      - lambda: |-
          id(failed_requests) = 0;
          id(consecutive_successes) += 1;
          id(last_probe_result) = "success";

          int now = (int) id(plug_uptime).state;
          int last_power_cycle_seconds = now - id(last_power_cycle);
          ESP_LOGD("internet_watchdog", "%d consecutive failed requests; %d power cycles; %d seconds of uptime; %d seconds since last power cycle", id(failed_requests), id(power_cycle_cnt), now, last_power_cycle_seconds);

    #   - logger.log:
    #     level: DEBUG
    #     format: 'Successful HTTP response'
    #     # args:
    #     #   - response->status_code
    #     #   - response->duration_ms
    # - if:
    #     condition:
    #       lambda: 'return id(failed_requests).state > 0;'
    #     then:
    #       - logger.log:
    #           level: INFO
    #           format: "Successful request; resetting failed request counter to 0"
    #       - number.set:
    #           id: failed_requests
    #           value: 0

  - id: http_request_failure
    then:
      - lambda: |-
          int now = (int) id(plug_uptime).state;
          id(consecutive_successes) = 0;
          id(last_probe_result) = "failure";
          /*
          Repeat power cycling can be really aggressive, especially since the power is down for 45 seconds but that is asynchronous to
          the HTTP timer. (Ie, the next HTTP request will happen 15 seconds after the power is cycled.) And we don't expect internet to be
          working while the routers boot back up.
          Failed HTTP requests within the first 90 seconds *after* the power cycle is completed won't increment the failed requests counter.
          Realistically, this means the first 2 minutes.
          */
          int last_power_cycle_seconds = now - id(last_power_cycle);
          if (last_power_cycle_seconds < (45 + 90)) {
            ESP_LOGI("internet_watchdog", "Request failed but last power cycle was only %d seconds ago so this doesn't even count", last_power_cycle_seconds);
            return;
          }

          id(failed_requests) += 1;

          ESP_LOGI("internet_watchdog", "Request Failed! %d consecutive failed requests; %d power cycles; %d seconds of uptime; %d seconds since last power cycle", id(failed_requests), id(power_cycle_cnt), now, last_power_cycle_seconds);

          if (id(failed_requests) >= ${failure_threshold}) {
            if (! id(relay).state) {
              ESP_LOGD("internet_watchdog", "Skipping power cycle because switch is currently off");
              return;
            }

            if (now < (5 * 60)) {
              ESP_LOGD("internet_watchdog", "Skipping power cycle during first 5 minutes after boot");
              return;
            }

            /*
            A simple backkoff strategy.
            After the first power cycle, if the internet is actually down then power cycling frequently doesn't seem
            to be working, and is disruptive to local devices. If the internet isn't down (false negative) then power cycling
            is disruptive to actual connectivity.
            *After* the first 3 consecutive failed requests and 10 minutes after boot (above), only powercycle if the failed
            request count (aka number of minutes) is a power of 2: 2 (skipped), 4, 8, 16, 32, 64, 128, 256, 512
            That's total minutes, not minutes since last power cycle. E.g, 32 happens 16 minutes after previous reboot.
            After 512 consecutive minutes, reboot every 4 hours -- so 752, 992, etc....
            This can overlap with the initial 5 minute wait. E.g., if all requests fail then first power cycle is after 8 minutes.
            */
            int fr = id(failed_requests);
            bool pow_of_two = fr && (( fr & (fr - 1)) == 0);
            bool should_reset = (fr <= 512 && pow_of_two) || (fr > 512 && (fr - 512) % 240 == 0);

            if (! should_reset) {
              ESP_LOGD("internet_watchdog", "Skipping power cycle because %d is not a power of 2 or every 4 hours after 8.5 hours ((x - 512) %% 240 == 0)", fr);
              return;
            }

            ESP_LOGI("internet_watchdog", "Power cycling the relay after %d consecutive failures", fr);
            id(request_power_cycle)->execute("watchdog", true);
          }

  - id: request_power_cycle
    mode: single
    parameters:
      reason: string
      automatic: bool
    then:
      - lambda: |-
          if (id(cycle_in_progress)) {
            ESP_LOGW("internet_watchdog", "Ignoring power cycle request while another cycle is in progress");
            id(request_power_cycle).stop();
            return;
          }

          if (automatic && !id(relay).state) {
            ESP_LOGW("internet_watchdog", "Ignoring automatic power cycle request because the relay is already off");
            id(request_power_cycle).stop();
            return;
          }

          int now = (int) id(plug_uptime).state;
          id(last_power_cycle) = now;
          id(power_cycle_cnt) += 1;
          id(last_cycle_reason) = reason;
          id(cycle_in_progress) = true;
          ESP_LOGI("internet_watchdog", "Starting %s power cycle at %d seconds uptime", reason.c_str(), now);
      - switch.turn_off: relay
      - delay: ${relay_off_time}
      - switch.turn_on: relay
      - lambda: |-
          id(cycle_in_progress) = false;
          ESP_LOGI("internet_watchdog", "Completed %s power cycle", id(last_cycle_reason).c_str());
