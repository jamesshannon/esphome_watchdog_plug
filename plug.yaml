esphome:
  name: plug-pm-1
  friendly_name: Plug (PM) 1
  platformio_options:
    board_build.mcu: esp32c3
    board_build.variant: esp32c3
  on_boot:
    priority: -100
    then:
      light.turn_on:
        id: device_status_led

esp32:
  variant: ESP32C3
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

safe_mode:

logger:
  level: DEBUG
  logs:
    component: NONE
    esp-idf: WARN
    sensor: INFO

api:
  id: api_component
  reboot_timeout: 0s
  actions:
    - action: power_cycle
      then:
        script.execute: cycle_power

ota:
  platform: esphome
  password: "c9e550ec104cd83f1fcfef5dc5b108a2"
  on_end:
    then:
      - logger.log: "Switching relay off for 45 seconds before rebooting"
      - switch.turn_off: relay
      - delay: 45s
      - switch.turn_off: relay


captive_portal:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Plug-Pm-1 Fallback Hotspot"
    password: "tpHfmEHr135L"
    ap_timeout: 30min

button:
  - platform: safe_mode
    name: Safe Mode

  - platform: restart
    name: Reboot Switch
    id: reboot_btn

  - platform: template
    name: Power Cycle
    id: power_cycle_btn
    device_class: restart
    on_press:
      then:
        - script.execute: cycle_power

