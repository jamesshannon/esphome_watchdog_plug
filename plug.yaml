# web_server: !remove

sensor:
  - platform: uptime
    type: seconds
    id: plug_uptime
    name: Plug Uptime
    internal: true

  - platform: template
    name: Failed Requests
    id: failed_requests_sensor
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(failed_requests);

  - platform: template
    name: Consecutive Successes
    id: consecutive_successes_sensor
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(consecutive_successes);

  - platform: template
    name: Power Cycles
    id: power_cycle_cnt_sensor
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(power_cycle_cnt);

  - platform: template
    name: Auto Cycle Stage
    id: auto_cycle_stage_sensor
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(auto_cycle_stage);

  - platform: template
    name: Last HTTP Status
    id: last_http_status_sensor
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(last_http_status);

  - platform: template
    name: Last HTTP Duration
    id: last_http_duration_ms_sensor
    entity_category: diagnostic
    unit_of_measurement: ms
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(last_http_duration_ms);

  # - platform: template
  #   id: testtesttest
  #   name: "Power Cycles"
  #   # state_class: total
  #   lambda: return 12.0;
  #   update_interval: 60s

globals:
  - id: last_power_cycle
    type: int
    restore_value: no
    initial_value: '0'

  - id: power_cycle_cnt
    type: int
    restore_value: yes
    initial_value: '0'

  - id: failed_requests
    type: int
    restore_value: no
    initial_value: '0'

  - id: consecutive_successes
    type: int
    restore_value: no
    initial_value: '0'

  - id: auto_cycle_stage
    type: int
    restore_value: yes
    initial_value: '0'

  - id: cycle_in_progress
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: last_http_status
    type: int
    restore_value: no
    initial_value: '-1'

  - id: last_http_duration_ms
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_probe_result
    type: std::string
    restore_value: no
    initial_value: '"startup"'

  - id: last_cycle_reason
    type: std::string
    restore_value: yes
    max_restore_data_length: 32
    initial_value: '"startup"'

interval:
  - interval: ${probe_interval}
    startup_delay: 300s
    then:
      script.execute: make_http_request



