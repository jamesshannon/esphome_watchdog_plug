substitutions:
  probe_interval: 60s
  relay_off_time: 45s
  self_reboot_settle_time: 1s
  startup_grace: 10min
  startup_grace_seconds: "600"
  recovery_grace: 10min
  recovery_grace_seconds: "600"
  max_stage_grace_seconds: "14400"
  max_auto_cycle_stage: "5"
  failure_threshold: "4"
  success_threshold: "3"

# COULD SIMPLIFY WITH SOMETHING LIKE THIS: https://graha.ms/posts/blog/2023-05-08-esphome-autorestart/

esphome:
  name: plug-pm-1
  friendly_name: Plug (PM) 1
  platformio_options:
    board_build.mcu: esp32c3
    board_build.variant: esp32c3
  on_boot:
    - priority: 700
      then:
        - if:
            condition:
              lambda: 'return id(cycle_in_progress);'
            then:
              - logger.log: "Finishing interrupted power cycle with a fresh 45 second off window"
              - lambda: |-
                  id(record_event)->execute(std::string("boot_resume_") + id(last_cycle_reason), true);
              - switch.turn_off: relay
              - delay: ${relay_off_time}
              - switch.turn_on: relay
              - lambda: |-
                  id(last_power_cycle) = (int) id(plug_uptime).state;
                  id(failed_requests) = 0;
                  id(consecutive_successes) = 0;
                  id(cycle_in_progress) = false;
                  ESP_LOGI("internet_watchdog", "Recovered interrupted %s power cycle after reboot", id(last_cycle_reason).c_str());
                  id(record_event)->execute(std::string("boot_recovery_complete_") + id(last_cycle_reason), true);
            else:
              - switch.turn_on: relay
              - script.execute:
                  id: record_event
                  event: "boot_normal"
                  persist: true
    - priority: -100
      then:
        - light.turn_on:
            id: device_status_led

esp32:
  variant: ESP32C3
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

