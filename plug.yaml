interval:
  - interval: ${probe_interval}
    startup_delay: 300s
    then:
      script.execute: make_http_request

  - interval: 1min
    then:
      - lambda: |-
          if (id(simulate_outage_enabled)) {
            if (id(simulate_outage_timeout_minutes) > 0) {
              id(simulate_outage_timeout_minutes) -= 1;
            }
            if (id(simulate_outage_timeout_minutes) <= 0) {
              id(simulate_outage_enabled) = false;
              id(simulate_outage_timeout_minutes) = 0;
              id(record_event)->execute("simulate_outage_timeout", true);
            }
          } else if (id(simulate_outage_timeout_minutes) != 0) {
            id(simulate_outage_timeout_minutes) = 0;
          }

          if (id(dry_run_enabled)) {
            if (id(dry_run_timeout_minutes) > 0) {
              id(dry_run_timeout_minutes) -= 1;
            }
            if (id(dry_run_timeout_minutes) <= 0) {
              id(dry_run_enabled) = false;
              id(dry_run_timeout_minutes) = 0;
              id(record_event)->execute("dry_run_timeout", true);
            }
          } else if (id(dry_run_timeout_minutes) != 0) {
            id(dry_run_timeout_minutes) = 0;
          }



