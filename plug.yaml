  - id: last_power_cycle
    type: int
    restore_value: no
    initial_value: '0'

  - id: power_cycle_cnt
    type: int
    restore_value: no
    initial_value: '0'

  - id: failed_requests
    type: int
    restore_value: no
    initial_value: '0'

  - id: failed_requests_no_api_client
    type: int
    restore_value: no
    initial_value: '0'

interval:
  - interval: 1min
    startup_delay: 300s
    then:
      script.execute: make_http_request



