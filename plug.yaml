output:
  - id: white_output
    platform: gpio
    pin: GPIO7
    inverted: true






script:
  - id: record_event
    mode: queued
    parameters:
      event: string
      persist: bool
    then:
      - lambda: |-
          char formatted[96];
          int now = (int) id(plug_uptime).state;
          snprintf(formatted, sizeof(formatted), "u%05d s%d %s", now, id(auto_cycle_stage), event.c_str());
          std::string entry(formatted);

          auto set_recent = [&](int slot, const std::string &value) {
            switch (slot) {
              case 0: id(recent_event_0) = value; break;
              case 1: id(recent_event_1) = value; break;
              case 2: id(recent_event_2) = value; break;
              case 3: id(recent_event_3) = value; break;
              case 4: id(recent_event_4) = value; break;
              case 5: id(recent_event_5) = value; break;
              case 6: id(recent_event_6) = value; break;
              case 7: id(recent_event_7) = value; break;
            }
          };

          auto set_journal = [&](int slot, const std::string &value) {
            switch (slot) {
              case 0: id(journal_event_0) = value; break;
              case 1: id(journal_event_1) = value; break;
              case 2: id(journal_event_2) = value; break;
            }
          };

          set_recent(id(recent_event_head), entry);
          id(recent_event_head) = (id(recent_event_head) + 1) % 8;
          if (id(recent_event_count) < 8) {
            id(recent_event_count) += 1;
          }

          if (!persist) {
            return;
          }

          set_journal(id(journal_event_head), entry);
          id(journal_event_head) = (id(journal_event_head) + 1) % 3;
          if (id(journal_event_count) < 3) {
            id(journal_event_count) += 1;
          }

  - id: make_http_request
    then:
      - http_request.get:
          url: https://www.google.com/generate_204
          on_response:
            then:
              - lambda: |-
                  id(last_http_status) = response->status_code;
                  id(last_http_duration_ms) = response->duration_ms;
                  if (response->status_code == 204) {
                    id(last_probe_result) = "http_204";
                    id(http_request_success).execute();
                    return;
                  }

                  id(last_probe_result) = "http_" + std::to_string(response->status_code);
                  id(http_request_failure).execute();
          on_error:
            then:
              - lambda: |-
                  id(last_http_status) = -1;
                  id(last_http_duration_ms) = 0;
                  id(last_probe_result) = "request_error";
                  id(http_request_failure).execute();

  - id: http_request_success
    then:
      - lambda: |-
          id(failed_requests) = 0;
          id(consecutive_successes) += 1;
          if (id(consecutive_successes) >= ${success_threshold} && id(self_reboot_attempted)) {
            id(self_reboot_attempted) = false;
            ESP_LOGI("internet_watchdog", "Cleared self-reboot guard after %d successful probes", id(consecutive_successes));
            id(record_event)->execute("clear_self_reboot_guard", false);
          }
          if (id(consecutive_successes) >= ${success_threshold} && id(auto_cycle_stage) != 0) {
            id(auto_cycle_stage) = 0;
            ESP_LOGI("internet_watchdog", "Reset automatic cycle stage after %d successful probes", id(consecutive_successes));
            id(record_event)->execute("reset_auto_cycle_stage", false);
          }

          int now = (int) id(plug_uptime).state;
          int seconds_since_power_restore = now - id(last_power_cycle);
          ESP_LOGD("internet_watchdog", "%d consecutive failed requests; %d power cycles; stage %d; %d seconds of uptime; %d seconds since power restore", id(failed_requests), id(power_cycle_cnt), id(auto_cycle_stage), now, seconds_since_power_restore);

    #   - logger.log:
    #     level: DEBUG
    #     format: 'Successful HTTP response'
    #     # args:
    #     #   - response->status_code
    #     #   - response->duration_ms
    # - if:
    #     condition:
    #       lambda: 'return id(failed_requests).state > 0;'
    #     then:
    #       - logger.log:
    #           level: INFO
    #           format: "Successful request; resetting failed request counter to 0"
    #       - number.set:
    #           id: failed_requests
    #           value: 0

  - id: http_request_failure
    then:
      - lambda: |-
          int now = (int) id(plug_uptime).state;
          id(consecutive_successes) = 0;

          if (id(cycle_in_progress) || id(request_power_cycle).is_running()) {
            ESP_LOGD("internet_watchdog", "Ignoring failed probe while a power cycle is still in progress");
            return;
          }

          // Stage 0 is the initial boot grace; later stages double the powered-on wait and cap at 4 hours.
          int stage_wait_seconds;
          if (id(auto_cycle_stage) == 0) {
            stage_wait_seconds = ${startup_grace_seconds};
          } else {
            stage_wait_seconds = ${startup_grace_seconds} * (1 << id(auto_cycle_stage));
            if (stage_wait_seconds > ${max_stage_grace_seconds}) {
              stage_wait_seconds = ${max_stage_grace_seconds};
            }
          }

          int required_powered_on_seconds = stage_wait_seconds;
          if (${recovery_grace_seconds} > required_powered_on_seconds) {
            required_powered_on_seconds = ${recovery_grace_seconds};
          }

          int seconds_since_power_restore = now - id(last_power_cycle);
          if (seconds_since_power_restore < required_powered_on_seconds) {
            ESP_LOGI("internet_watchdog", "Request failed but the relay has only been powered for %d seconds; waiting for the %d second grace window for stage %d", seconds_since_power_restore, required_powered_on_seconds, id(auto_cycle_stage));
            return;
          }

          id(failed_requests) += 1;

          ESP_LOGI("internet_watchdog", "Request Failed! %d consecutive failed requests; %d power cycles; stage %d; %d seconds of uptime; %d seconds since power restore", id(failed_requests), id(power_cycle_cnt), id(auto_cycle_stage), now, seconds_since_power_restore);

          if (id(failed_requests) < ${failure_threshold}) {
            return;
          }

          if (!id(relay).state) {
            ESP_LOGD("internet_watchdog", "Skipping automatic power cycle because the relay is currently off");
            return;
          }

          if (id(request_power_cycle).is_running()) {
            ESP_LOGD("internet_watchdog", "Skipping automatic power cycle because the cycle script is already running");
            return;
          }

          ESP_LOGI("internet_watchdog", "Starting automatic recovery after %d consecutive failures at stage %d", id(failed_requests), id(auto_cycle_stage));
          id(request_power_cycle)->execute("watchdog", true, true);

  - id: request_power_cycle
    mode: single
    parameters:
      reason: string
      automatic: bool
      allow_self_reboot_preflight: bool
    then:
      - lambda: |-
          if (id(cycle_in_progress)) {
            ESP_LOGW("internet_watchdog", "Ignoring power cycle request while another cycle is in progress");
            id(record_event)->execute("skip_cycle_in_progress", false);
            id(request_power_cycle).stop();
            return;
          }

          if (automatic && !id(relay).state) {
            ESP_LOGW("internet_watchdog", "Ignoring automatic power cycle request because the relay is already off");
            id(record_event)->execute("skip_auto_cycle_relay_off", false);
            id(request_power_cycle).stop();
            return;
          }

          // Use at most one ESP self-reboot per outage, and only while the relay is already intentionally off.
          id(self_reboot_pending) = automatic && allow_self_reboot_preflight && !id(self_reboot_attempted);
          int now = (int) id(plug_uptime).state;
          // Advance the automatic retry stage before power drops so reboot recovery keeps the next backoff.
          if (automatic && id(auto_cycle_stage) < ${max_auto_cycle_stage}) {
            id(auto_cycle_stage) += 1;
          }
          id(power_cycle_cnt) += 1;
          id(failed_requests) = 0;
          id(consecutive_successes) = 0;
          id(last_cycle_reason) = reason;
          id(cycle_in_progress) = true;
          id(record_event)->execute((automatic ? std::string("cycle_auto_") : std::string("cycle_manual_")) + reason, false);
          if (id(self_reboot_pending)) {
            id(self_reboot_attempted) = true;
            id(self_reboot_count) += 1;
            id(last_self_reboot_reason) = reason;
            id(last_probe_result) = "self_reboot_preflight";
            id(record_event)->execute(std::string("self_reboot_preflight_") + reason, true);
          }
          ESP_LOGI("internet_watchdog", "Starting %s power cycle at %d seconds uptime (automatic=%s, stage=%d, self_reboot=%s)", reason.c_str(), now, automatic ? "true" : "false", id(auto_cycle_stage), id(self_reboot_pending) ? "true" : "false");
      - if:
          condition:
            lambda: 'return id(self_reboot_pending);'
          then:
            - switch.turn_off: relay
            - delay: ${self_reboot_settle_time}
            - logger.log: "Relay is off; rebooting the ESP before finishing the recovery window"
            - button.press: reboot_btn
          else:
            - switch.turn_off: relay
            - delay: ${relay_off_time}
            - switch.turn_on: relay
            - lambda: |-
                id(last_power_cycle) = (int) id(plug_uptime).state;
                id(cycle_in_progress) = false;
                id(self_reboot_pending) = false;
                ESP_LOGI("internet_watchdog", "Completed %s power cycle; recovery timer restarted at %d seconds uptime", id(last_cycle_reason).c_str(), id(last_power_cycle));
                id(record_event)->execute(std::string("cycle_complete_") + id(last_cycle_reason), true);
