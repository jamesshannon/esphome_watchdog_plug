    id: last_self_reboot_reason_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      return {id(last_self_reboot_reason)};

  - platform: template
    name: Latest Event
    id: latest_event_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      if (id(recent_event_count) == 0) {
        return {"none"};
      }

      int slot = id(recent_event_head) - 1;
      if (slot < 0) {
        slot += 8;
      }

      switch (slot) {
        case 0: return {id(recent_event_0)};
        case 1: return {id(recent_event_1)};
        case 2: return {id(recent_event_2)};
        case 3: return {id(recent_event_3)};
        case 4: return {id(recent_event_4)};
        case 5: return {id(recent_event_5)};
        case 6: return {id(recent_event_6)};
        case 7: return {id(recent_event_7)};
        default: return {"invalid"};
      }

  - platform: template
    name: Recent Events
    id: recent_events_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      if (id(recent_event_count) == 0) {
        return {"none"};
      }

      std::string out;
      for (int offset = 0; offset < id(recent_event_count); offset++) {
        int slot = id(recent_event_head) - 1 - offset;
        if (slot < 0) {
          slot += 8;
        }

        std::string entry;
        switch (slot) {
          case 0: entry = id(recent_event_0); break;
          case 1: entry = id(recent_event_1); break;
          case 2: entry = id(recent_event_2); break;
          case 3: entry = id(recent_event_3); break;
          case 4: entry = id(recent_event_4); break;
          case 5: entry = id(recent_event_5); break;
          case 6: entry = id(recent_event_6); break;
          case 7: entry = id(recent_event_7); break;
          default: entry = "invalid"; break;
        }

        if (entry.empty()) {
          continue;
        }

        if (!out.empty()) {
          out += " | ";
        }
        out += entry;
      }

      if (out.empty()) {
        return {"none"};
      }
      return {out};

  - platform: template
    name: Latest Journal Event
    id: latest_journal_event_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      if (id(journal_event_count) == 0) {
        return {"none"};
      }

      int slot = id(journal_event_head) - 1;
      if (slot < 0) {
        slot += 3;
      }

      switch (slot) {
        case 0: return {id(journal_event_0)};
        case 1: return {id(journal_event_1)};
        case 2: return {id(journal_event_2)};
        default: return {"invalid"};
      }

  - platform: template
    name: Critical Event Journal
    id: critical_event_journal_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      if (id(journal_event_count) == 0) {
        return {"none"};
      }

      std::string out;
      for (int offset = 0; offset < id(journal_event_count); offset++) {
        int slot = id(journal_event_head) - 1 - offset;
        if (slot < 0) {
          slot += 3;
        }

        std::string entry;
        switch (slot) {
          case 0: entry = id(journal_event_0); break;
          case 1: entry = id(journal_event_1); break;
          case 2: entry = id(journal_event_2); break;
          default: entry = "invalid"; break;
        }

        if (entry.empty()) {
          continue;
        }

        if (!out.empty()) {
          out += " | ";
        }
        out += entry;
      }

      if (out.empty()) {
        return {"none"};
      }
      return {out};

