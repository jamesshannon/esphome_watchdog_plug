switch:
  - platform: gpio
    name: Relay
    id: relay
    device_class: outlet
    pin: GPIO6
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      then:
        - light.turn_on: white_led
    on_turn_off:
      then:
        - light.turn_off: white_led


binary_sensor:
  - platform: gpio
    internal: true
    pin:
      number: GPIO2
      mode: INPUT_PULLUP
      inverted: true
    name: Button
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - switch.toggle: relay

  - platform: template
    name: Cycle In Progress
    id: cycle_in_progress_sensor
    entity_category: diagnostic
    lambda: |-
      return id(cycle_in_progress);

text_sensor:
  - platform: template
    name: Last Probe Result
    id: last_probe_result_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      return {id(last_probe_result)};

  - platform: template
    name: Last Cycle Reason
    id: last_cycle_reason_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      return {id(last_cycle_reason)};

light:
  - platform: binary
    internal: true
    name: White LED
    id: white_led
    output: white_output
    restore_mode: ALWAYS_ON

  - platform: status_led
    name: "Device Status"
    id: device_status_led
    pin:
      number: GPIO8
      inverted: True
    internal: True


# status_led:
