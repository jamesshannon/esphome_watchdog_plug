  password: "c9e550ec104cd83f1fcfef5dc5b108a2"


captive_portal:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Plug-Pm-1 Fallback Hotspot"
    password: "tpHfmEHr135L"
    ap_timeout: 30min

button:
  - platform: safe_mode
    name: Safe Mode

  - platform: restart
    name: Reboot Switch
    id: reboot_btn

  - platform: template
    name: Power Cycle
    id: power_cycle_btn
    device_class: restart
    on_press:
      then:
        - script.execute:
            id: request_power_cycle
            reason: "template_button"
            automatic: false

